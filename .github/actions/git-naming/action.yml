name: 'dcness git-naming validation'
description: 'Validate branch name / commit / PR title against dcness git-spec'
inputs:
  branch:
    description: 'Branch name to validate (skip if empty)'
    required: false
    default: ''
  title:
    description: 'PR title or commit subject to validate (skip if empty)'
    required: false
    default: ''
runs:
  using: composite
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
      with:
        node-version: '20'

    - name: Validate branch name
      if: inputs.branch != ''
      shell: bash
      env:
        INPUT_BRANCH: ${{ inputs.branch }}
      run: node "${{ github.action_path }}/../../../scripts/check_git_naming.mjs" --branch "$INPUT_BRANCH"

    - name: Validate title
      if: inputs.title != ''
      shell: bash
      env:
        INPUT_TITLE: ${{ inputs.title }}
      run: node "${{ github.action_path }}/../../../scripts/check_git_naming.mjs" --title "$INPUT_TITLE"
