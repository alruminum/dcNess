name: 'dcness GitHub Project lifecycle'
description: 'Validate or update dcNess GitHub Project v2 Status, IssueType, Priority lifecycle.'
inputs:
  mode:
    description: 'bootstrap, validate-issue, start-work, or pr-merged'
    required: true
  repo:
    description: 'OWNER/REPO'
    required: true
  project-owner:
    description: 'GitHub Project owner'
    required: true
  project-number:
    description: 'GitHub Project number'
    required: true
  issue-number:
    description: 'Issue number for validate-issue or start-work'
    required: false
    default: ''
  pr-body:
    description: 'PR body for pr-merged mode'
    required: false
    default: ''
  expected-status:
    description: 'Optional expected Status for validate-issue'
    required: false
    default: ''
  expected-issue-type:
    description: 'Optional expected IssueType for validate-issue'
    required: false
    default: ''
  expected-priority:
    description: 'Optional expected Priority for validate-issue'
    required: false
    default: ''
  apply:
    description: 'Set to true to create labels/fields or update Status'
    required: false
    default: 'false'
  gh-token:
    description: 'GitHub token with project scope (gh project read/write). 호출 워크플로에서 secrets.DCNESS_PROJECT_TOKEN || github.token 전달.'
    required: false
    default: ''
runs:
  using: composite
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
      with:
        node-version: '20'

    - name: Run Project lifecycle guard
      shell: bash
      env:
        INPUT_MODE: ${{ inputs.mode }}
        INPUT_REPO: ${{ inputs.repo }}
        INPUT_PROJECT_OWNER: ${{ inputs.project-owner }}
        INPUT_PROJECT_NUMBER: ${{ inputs.project-number }}
        INPUT_ISSUE_NUMBER: ${{ inputs.issue-number }}
        INPUT_EXPECTED_STATUS: ${{ inputs.expected-status }}
        INPUT_EXPECTED_ISSUE_TYPE: ${{ inputs.expected-issue-type }}
        INPUT_EXPECTED_PRIORITY: ${{ inputs.expected-priority }}
        INPUT_APPLY: ${{ inputs.apply }}
        PR_BODY: ${{ inputs.pr-body }}
        # composite action 은 부모 step 의 env 를 상속하지 않으므로 GH_TOKEN 을 input 으로 받아 명시 매핑.
        GH_TOKEN: ${{ inputs.gh-token }}
      run: |
        set -euo pipefail
        ARGS=(
          "$INPUT_MODE"
          --repo "$INPUT_REPO"
          --owner "$INPUT_PROJECT_OWNER"
          --project "$INPUT_PROJECT_NUMBER"
        )
        if [ -n "$INPUT_ISSUE_NUMBER" ]; then
          ARGS+=(--issue "$INPUT_ISSUE_NUMBER")
        fi
        if [ -n "$INPUT_EXPECTED_STATUS" ]; then
          ARGS+=(--expected-status "$INPUT_EXPECTED_STATUS")
        fi
        if [ -n "$INPUT_EXPECTED_ISSUE_TYPE" ]; then
          ARGS+=(--expected-issue-type "$INPUT_EXPECTED_ISSUE_TYPE")
        fi
        if [ -n "$INPUT_EXPECTED_PRIORITY" ]; then
          ARGS+=(--expected-priority "$INPUT_EXPECTED_PRIORITY")
        fi
        if [ "$INPUT_MODE" = "pr-merged" ]; then
          ARGS+=(--body-env PR_BODY)
        fi
        if [ "$INPUT_APPLY" = "true" ]; then
          ARGS+=(--apply)
        fi
        node "${{ github.action_path }}/../../../scripts/github_project_lifecycle.mjs" "${ARGS[@]}"
