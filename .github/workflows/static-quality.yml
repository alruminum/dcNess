# GitHub Actions — static quality gates for Python 3.11.
#
# Baseline config lives in pyproject.toml. The three job names are stable check
# names for branch protection and PR triage.

name: static-quality

on:
  pull_request:
    branches: [main]
    paths:
      - 'harness/**'
      - 'scripts/**'
      - 'tests/**'
      - 'pyproject.toml'
      - 'requirements-quality.txt'
      - 'README.md'
      - '.github/workflows/static-quality.yml'
  push:
    branches: [main]
    paths:
      - 'harness/**'
      - 'scripts/**'
      - 'tests/**'
      - 'pyproject.toml'
      - 'requirements-quality.txt'
      - 'README.md'
      - '.github/workflows/static-quality.yml'

permissions:
  contents: read

jobs:
  ruff:
    name: ruff lint + complexity
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.11'

      - name: Install quality tools
        run: python -m pip install -r requirements-quality.txt

      - name: Run ruff
        run: ruff check .

  mypy:
    name: mypy type check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.11'

      - name: Install quality tools
        run: python -m pip install -r requirements-quality.txt

      - name: Run mypy
        run: mypy

  bandit:
    name: bandit security scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.11'

      - name: Install quality tools
        run: python -m pip install -r requirements-quality.txt

      - name: Run bandit
        run: bandit -c pyproject.toml -r harness scripts -l -i
