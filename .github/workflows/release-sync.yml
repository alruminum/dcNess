name: release sync

on:
  push:
    branches: [main]

concurrency:
  group: release-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: configure git
        run: |
          git config user.name "release-sync-bot"
          git config user.email "release-sync@dcness.local"
      - name: run sync
        run: bash scripts/sync_release.sh --yes
