# GitHub Actions — Python unittest 자동 실행
#
# 목적:
# - harness/signal_io.py 회귀 차단 (prose I/O / interpret_signal 휴리스틱 / path safety)
# - DCN-CHG-20260429-13 prose-only 패턴 회귀 차단
#
# 트리거:
# - PR / push to main 시 tests/ 또는 harness/ 또는 agents/ 또는 skills/ 변경 시
#   (skills/ = test_loop_procedure_base_ref / test_impl_cost_aware 가 skills/<n>/SKILL.md 내용 단언)
#   (commands/ = test_skill_scenarios / test_surface_docs_sync 가 commands/init-dcness.md deploy·문서 단언)
#   (templates/github-workflows/ = init-dcness 선택형 workflow 배포 파일 단언)
# - scripts/check_git_naming.mjs / docs/plugin/git-spec.md 변경 시 (test_git_naming 게이트 회귀 차단)
# - scripts/check_doc_path_integrity.mjs / .github/actions/doc-path-integrity 변경 시
#   (test_doc_path_integrity 게이트 회귀 차단)
# - docs/plugin/loop-procedure.md 변경 시 (test_loop_procedure_base_ref base-ref 회귀 차단)
# - paths 필터로 docs-only PR 에서 불필요 실행 회피
# - DCN-CHG-20260501-06: branch protection 폐기 후 paths 필터 복구
#   (BLOCKED 영원히 문제는 protection 자체를 끄면서 자연 해소)
#
# proposal §11.4 안전망: "매 sub-phase squash merge 후 측정" 의 자동화 버전

name: python-tests

on:
  pull_request:
    branches: [main]
    paths:
      - 'harness/**'
      - 'tests/**'
      - 'agents/**'
      - 'skills/**'
      - 'commands/**'
      - 'templates/github-workflows/**'
      - 'evals/**'
      - 'scripts/check_git_naming.mjs'
      - 'scripts/check_doc_path_integrity.mjs'
      - '.github/actions/doc-path-integrity/**'
      - 'docs/plugin/git-spec.md'
      - 'docs/plugin/loop-procedure.md'
      - '.github/workflows/python-tests.yml'
  push:
    branches: [main]
    paths:
      - 'harness/**'
      - 'tests/**'
      - 'agents/**'
      - 'skills/**'
      - 'commands/**'
      - 'templates/github-workflows/**'
      - 'evals/**'
      - 'scripts/check_git_naming.mjs'
      - 'scripts/check_doc_path_integrity.mjs'
      - '.github/actions/doc-path-integrity/**'
      - 'docs/plugin/git-spec.md'
      - 'docs/plugin/loop-procedure.md'
      - '.github/workflows/python-tests.yml'

permissions:
  contents: read

jobs:
  unittest:
    name: unittest discover
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.11'

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '20'

      - name: Run unittest
        run: |
          set -e
          python3 -m unittest discover -s tests -v
