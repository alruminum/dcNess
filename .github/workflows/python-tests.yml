# GitHub Actions — Python unittest 자동 실행
#
# 목적:
# - harness/signal_io.py 회귀 차단 (prose I/O / interpret_signal 휴리스틱 / path safety)
# - DCN-CHG-20260429-13 prose-only 패턴 회귀 차단
#
# 트리거:
# - 모든 PR / push to main (DCN-30-04 — branch protection required check 정합).
# - paths 필터 폐기 사유: required check 가 paths 미스매치로 발화 안 하면 BLOCKED
#   영원히. CI 비용 < 안전성. 본 repo small.
#
# proposal §11.4 안전망: "매 sub-phase squash merge 후 측정" 의 자동화 버전

name: python-tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  unittest:
    name: unittest discover
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run unittest
        run: |
          set -e
          python3 -m unittest discover -s tests -v
