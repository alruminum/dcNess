# GitHub Actions — Python unittest 자동 실행
#
# 목적:
# - harness/signal_io.py 회귀 차단 (prose I/O / interpret_signal 휴리스틱 / path safety)
# - DCN-CHG-20260429-13 prose-only 패턴 회귀 차단
#
# 트리거:
# - PR / push to main 시 tests/ 또는 harness/ 또는 agents/ 변경 시
# - paths 필터로 docs-only PR 에서 불필요 실행 회피
#
# proposal §11.4 안전망: "매 sub-phase squash merge 후 측정" 의 자동화 버전

name: python-tests

on:
  pull_request:
    branches: [main]
    paths:
      - 'harness/**'
      - 'tests/**'
      - 'agents/**'
      - '.github/workflows/python-tests.yml'
  push:
    branches: [main]
    paths:
      - 'harness/**'
      - 'tests/**'
      - 'agents/**'
      - '.github/workflows/python-tests.yml'

permissions:
  contents: read

jobs:
  unittest:
    name: unittest discover
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run unittest
        run: |
          set -e
          python3 -m unittest discover -s tests -v
