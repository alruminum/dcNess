name: public-surface-validation

on:
  pull_request:
    branches: [main]
    paths:
      - 'docs/plugin/positioning.md'
      - 'README.md'
      - 'skills/**'
      - 'commands/**'
      - 'agents/*.md'
      - 'scripts/check_public_surface.mjs'
      - '.github/workflows/public-surface-validation.yml'
  push:
    branches: [main]
    paths:
      - 'docs/plugin/positioning.md'
      - 'README.md'
      - 'skills/**'
      - 'commands/**'
      - 'agents/*.md'
      - 'scripts/check_public_surface.mjs'
      - '.github/workflows/public-surface-validation.yml'

permissions:
  contents: read

jobs:
  validate:
    name: validate public surface
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '20'

      - name: Run public surface check
        run: node scripts/check_public_surface.mjs
