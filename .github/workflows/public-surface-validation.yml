name: public-surface-validation

on:
  pull_request:
    branches: [main]
    paths:
      - 'docs/plugin/positioning.md'
      - 'README.md'
      - 'skills/**'
      - 'commands/**'
      - 'agents/*.md'
      - 'scripts/check_public_surface.mjs'
      - '.github/workflows/public-surface-validation.yml'
  push:
    branches: [main]
    paths:
      - 'docs/plugin/positioning.md'
      - 'README.md'
      - 'skills/**'
      - 'commands/**'
      - 'agents/*.md'
      - 'scripts/check_public_surface.mjs'
      - '.github/workflows/public-surface-validation.yml'

permissions:
  contents: read

jobs:
  validate:
    name: validate public surface
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run public surface check
        run: node scripts/check_public_surface.mjs
