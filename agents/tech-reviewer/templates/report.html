<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Tech Review Report</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 32px; line-height: 1.5; color: #1f2937; }
    h1, h2 { line-height: 1.2; }
    table { border-collapse: collapse; width: 100%; margin: 16px 0; }
    th, td { border: 1px solid #d1d5db; padding: 8px; text-align: left; vertical-align: top; }
    .card { border: 1px solid #d1d5db; padding: 16px; margin: 16px 0; }
    pre { background: #f3f4f6; padding: 12px; overflow: auto; }
  </style>
</head>
<body>
  <h1>Tech Review Report</h1>
  <section>
    <h2>요약</h2>
    <table>
      <thead><tr><th>항목</th><th>verdict</th><th>핵심 근거</th></tr></thead>
      <tbody></tbody>
    </table>
  </section>
  <section>
    <h2>항목별 상세</h2>
    <article class="card">
      <h3>기술 이름</h3>
      <p>사용 가능성, 비용, 라이선스, 대안을 요약한다.</p>
    </article>
  </section>
  <section>
    <h2>증거</h2>
  </section>
</body>
</html>
